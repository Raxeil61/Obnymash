<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        .pusheen-bg {
            width: 100%;
            height: 100%;
            background-image: url('Пушин работает.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .pusheen-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .pusheen-text {
            font-family: 'Gabriela', serif;
            font-size: 32px;
            font-weight: bold;
            color: #FFFFFF;
            text-align: center;
            padding: 20px 40px;
            z-index: 2;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div class="pusheen-bg">
        <h1 class="pusheen-text">Здесь должна быть форма входа, но её украл Пушин!</h1>
    </div>

</body>
</html>
